<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="../assets/css/styles-filtre.css">
        <title>petit-filtre</title>
    </head>

    <body>
        <div class="conteneur-filtre">
            <h2 class="titre-filtre">Filtrer par type d'indice :</h2>
            <ul class="liste-filtre">
                <li>
                    <input class="screen-reader-only" name="indice" id="Personnage" type="radio" value="Personnage" required>
                    <label for="Personnage"><img src="../assets/images-filtre/iconeFiltre_1_53.jpg" alt="Personnage"></label>
                </li>
                <li>
                    <input class="screen-reader-only" name="indice" id="Objet" type="radio" value="Objet">
                    <label for="Objet"><img src="../assets/images-filtre/iconeFiltre_2_53.jpg" alt="Objet"></label>
                </li>
                <li>
                    <input class="screen-reader-only" name="indice" id="Lieu" type="radio" value="Lieu">
                    <label for="Lieu"><img src="../assets/images-filtre/iconeFiltre_3_53.jpg" alt="Lieu"></label>
                </li>
            </ul>

            <h2 class="titre-filtre">Filtrer par secteur d'activité :</h2>
            <ul class="liste-filtre">
                <li>
                    <input class="screen-reader-only" name="secteur" id="sport-spectacles" type="radio" value="sport-spectacles" required>
                    <label for="sport-spectacles"><img src="../assets/images-filtre/iconeFiltre_4_53.jpg" alt="sport et spectacles"></label>
                </li>
                <li>
                    <input class="screen-reader-only" name="secteur" id="sciences-lettres" type="radio" value="sciences-lettres">
                    <label for="sciences-lettres"><img src="../assets/images-filtre/iconeFiltre_5_53.jpg" alt="Sciences et lettres"></label>
                </li>
                <li>
                    <input class="screen-reader-only" name="secteur" id="economie-politique" type="radio" value="economie-politique">
                    <label for="economie-politique"><img src="../assets/images-filtre/iconeFiltre_6_53.jpg" alt="economie et politique"></label>
                </li>
                <li>
                    <input class="screen-reader-only" name="secteur" id="art-visuel" type="radio" value="art-visuel">
                    <label for="art-visuel"><img src="../assets/images-filtre/iconeFiltre_7_53.jpg" alt="art-visuel"></label>
                </li>
            </ul>
        </div>

    </body>
</html>
